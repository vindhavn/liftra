# Liftra Configuration Example
# Copy this file to config.yaml and modify as needed

# Storage configuration
storage:
  # Type of storage backend: sqlite, cloud, server
  type: sqlite
  
  # SQLite configuration (for type: sqlite)
  sqlite:
    database_path: liftra.db
    # Optional encryption key (base64 encoded)
    # encryption_key: "base64-encoded-encryption-key"
  
  # Cloud storage configuration (for type: cloud)
  cloud:
    provider: nextcloud  # nextcloud, google_drive, onedrive
    nextcloud:
      base_url: https://your-nextcloud-server.com
      username: your-username
      password: your-password
      # Or use app password
      app_password: your-app-password
    google_drive:
      client_id: your-client-id
      client_secret: your-client-secret
      refresh_token: your-refresh-token
    onedrive:
      client_id: your-client-id
      client_secret: your-client-secret
      refresh_token: your-refresh-token
  
  # Server configuration (for type: server)
  server:
    host: localhost
    port: 5432
    database: liftra
    username: liftra_user
    password: liftra_password

# Security configuration
security:
  # Master encryption key (generate with: openssl rand -base64 32)
  # master_key: "your-32-byte-base64-encoded-master-key"
  
  # Authentication (for server mode)
  authentication:
    enabled: true
    method: password  # password, token, both
    
  # Password requirements
  password:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_digits: true
    require_special: true

# Application configuration
app:
  # Default currency
  default_currency: GBP
  
  # Date format
  date_format: YYYY-MM-DD
  
  # Number format
  decimal_separator: .
  thousands_separator: ,
  
  # Language
  language: en-GB
  
  # Theme
  theme: system  # light, dark, system

# Logging configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: liftra.log
  max_size: 10485760  # 10MB
  backup_count: 5

# Backup configuration
backup:
  enabled: true
  directory: ./backups
  frequency: daily  # daily, weekly, monthly
  max_backups: 10
  encrypt: true

# Import/Export configuration
import_export:
  default_format: csv
  auto_detect: true
  
  # CSV configuration
  csv:
    delimiter: ,
    quotechar: "
    encoding: utf-8

# Plugin configuration
plugins:
  enabled: true
  directory: ./plugins
  auto_load: true
  
  # Plugin-specific configuration
  # currency_api:
  #   enabled: true
  #   provider: exchangerate-api
  #   api_key: your-api-key

# Feature flags
features:
  experimental: false
  analytics: false
  crash_reporting: false

# Development configuration
development:
  debug: false
  hot_reload: false
  show_sql: false
